# Dev override for ./start.sh (default mode): run the app from source with
# hot-reload (tsx watch), bind-mounting the working tree so edits restart it.
# Production (./start.sh prod) uses docker-compose.yml on its own.
services:
  app:
    build:
      context: .
      target: build # the build stage has all deps, including tsx
    command: ['npx', 'tsx', 'watch', 'src/server.ts']
    environment:
      NODE_ENV: development
    volumes:
      - ./src:/app/src
      - ./migrations:/app/migrations
      - ./public:/app/public

  # Dev-only: publish Gotenberg on a loopback port so host-side tooling (the resource-completeness
  # rasteriser, smoke tests) can reach it directly, in addition to the app's internal gotenberg:3000.
  # Still gated by the `preview` profile — start it with:
  #   docker compose -f docker-compose.yml -f docker-compose.dev.yml --profile preview up -d gotenberg
  gotenberg:
    ports:
      - "127.0.0.1:3001:3000"
