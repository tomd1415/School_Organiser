# Phase 0 stack: Postgres (with pgvector) + the app.
# Dev:   docker compose up -d db   (then run the app on the host with `npm run dev`)
# Full:  docker compose up -d --build
name: school_organiser

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: organiser
      POSTGRES_PASSWORD: organiser
      POSTGRES_DB: organiser
    ports:
      - "5434:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U organiser"]
      interval: 5s
      timeout: 3s
      retries: 10

  gotenberg:
    image: gotenberg/gotenberg:8
    restart: unless-stopped
    # Behind a profile so the core stack never waits on this large image. The app degrades
    # to download-only when it is absent. Enable preview with:
    #   docker compose --profile preview up -d gotenberg
    profiles: ["preview"]
    # Internal only — the app reaches it at http://gotenberg:3000 for Office→PDF preview.

  app:
    build: .
    # Secrets come from app/.env as a literal env_file. This matters because the
    # scrypt password hash contains '$' — passing it through Compose ${VAR}
    # interpolation would corrupt it. env_file values are never interpolated.
    env_file:
      - path: .env
        required: false
    environment:
      # Overrides for the two values that differ inside the container.
      NODE_ENV: production
      DATABASE_URL: postgres://organiser:organiser@db:5432/organiser
      RESOURCE_STORE_PATH: /data/resources
      GOTENBERG_URL: http://gotenberg:3000
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "44360:44360"
    volumes:
      # Bind mount so the host (bulk-import, backups) and the app share one directory.
      - ../data/resources:/data/resources
    restart: unless-stopped

volumes:
  db-data:
