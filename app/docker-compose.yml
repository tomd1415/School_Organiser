# Phase 0 stack: Postgres (with pgvector) + the app.
# Dev:   docker compose up -d db   (then run the app on the host with `npm run dev`)
# Full:  docker compose up -d --build
name: school_organiser

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: organiser
      # Dev default is "organiser"; production sets a random DB_PASSWORD in app/.env (deploy/install.sh).
      POSTGRES_PASSWORD: ${DB_PASSWORD:-organiser}
      POSTGRES_DB: organiser
    ports:
      - "5434:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U organiser"]
      interval: 5s
      timeout: 3s
      retries: 10

  gotenberg:
    image: gotenberg/gotenberg:8
    restart: unless-stopped
    # Behind a profile so the core stack never waits on this large image. The app degrades
    # to download-only when it is absent. Enable preview with:
    #   docker compose --profile preview up -d gotenberg
    profiles: ["preview"]
    # Internal only — the app reaches it at http://gotenberg:3000 for Office→PDF preview.

  app:
    build: .
    # Secrets come from app/.env as a literal env_file. This matters because the
    # scrypt password hash contains '$' — passing it through Compose ${VAR}
    # interpolation would corrupt it. env_file values are never interpolated.
    env_file:
      - path: .env
        required: false
    environment:
      # Overrides for the two values that differ inside the container.
      NODE_ENV: production
      DATABASE_URL: postgres://organiser:${DB_PASSWORD:-organiser}@db:5432/organiser
      RESOURCE_STORE_PATH: /data/resources
      GOTENBERG_URL: http://gotenberg:3000
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "44360:44360"
    volumes:
      # Bind mount so the host (bulk-import, backups) and the app share one directory.
      - ../data/resources:/data/resources
    restart: unless-stopped

  # Production reverse proxy with automatic LAN TLS. Behind a profile so dev never starts it; the
  # production installer brings it up with `--profile proxy`. It fronts the app on 80/443, so in
  # production the app's own 44360 stays a direct/debug port (front door is https://$SITE_ADDRESS).
  caddy:
    image: caddy:2
    profiles: ["proxy"]
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:-organiser.school.internal}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - app

volumes:
  db-data:
  caddy-data:
  caddy-config:
