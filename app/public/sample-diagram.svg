<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300" role="img" aria-label="Sample board diagram to label">
  <rect x="2" y="2" width="396" height="296" rx="16" fill="#eaf1fb" stroke="#9ab4d8" stroke-width="2"/>
  <!-- USB connector (top centre ~50%, 8%) -->
  <rect x="170" y="6" width="60" height="26" rx="4" fill="#c0c8d4" stroke="#7c8aa0"/>
  <!-- LED display (centre ~50%, 45%) -->
  <rect x="150" y="110" width="100" height="70" rx="6" fill="#1b1f2a"/>
  <g fill="#e2483d">
    <rect x="162" y="122" width="12" height="12"/><rect x="194" y="122" width="12" height="12"/><rect x="226" y="122" width="12" height="12"/>
    <rect x="162" y="146" width="12" height="12"/><rect x="194" y="146" width="12" height="12"/><rect x="226" y="146" width="12" height="12"/>
  </g>
  <!-- Button A (~20%, 60%) -->
  <circle cx="80" cy="180" r="22" fill="#cfd6e0" stroke="#7c8aa0" stroke-width="2"/>
  <text x="80" y="186" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#333">A</text>
  <!-- Button B (~80%, 60%) -->
  <circle cx="320" cy="180" r="22" fill="#cfd6e0" stroke="#7c8aa0" stroke-width="2"/>
  <text x="320" y="186" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#333">B</text>
  <!-- pins along the bottom -->
  <g fill="#d4b24a">
    <rect x="60" y="276" width="40" height="22"/><rect x="180" y="276" width="40" height="22"/><rect x="300" y="276" width="40" height="22"/>
  </g>
</svg>
